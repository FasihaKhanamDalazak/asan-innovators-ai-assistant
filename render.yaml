services:
  - type: web
    name: asan-ai-assistant-backend
    root: backend
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install uv && uv sync
    startCommand: uv run --active uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_UNBUILTINS
        value: /opt/render/project/python/bin/python -m 'importlib._bootstrap'
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://asan-innovators-ai-assistant.vercel.app
    healthCheckPath: /

  - type: static
    name: asan-ai-assistant-frontend
    root: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

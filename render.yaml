services:
  - type: web
    name: asan-ai-assistant-backend
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install --upgrade pip && pip install -e ./backend
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: FRONTEND_URL
        value: https://asan-innovators-ai-assistant.vercel.app
    healthCheckPath: /
